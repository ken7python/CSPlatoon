<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CSplatoon</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #canvas {
      display: block;
      /* CSS サイズは JS で動的に設定 — レンダリング解像度は変えない */
    }
  </style>
</head>
<body>
  <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

  <script>
    // 矢印キー・スペースによるページスクロールを無効化
    window.addEventListener("keydown", function (e) {
      const blocked = [32, 37, 38, 39, 40]; // Space, Left, Up, Right, Down
      if (blocked.includes(e.keyCode)) e.preventDefault();
    }, { passive: false });

    // ゲーム本来の解像度 (main.cpp の screenWidth / screenHeight に合わせる)
    const GAME_W = 1280;
    const GAME_H = 720;

    function fitCanvas() {
      const canvas = document.getElementById("canvas");
      if (!canvas) return;
      const scaleX = window.innerWidth  / GAME_W;
      const scaleY = window.innerHeight / GAME_H;
      const scale  = Math.min(scaleX, scaleY);
      canvas.style.width  = (GAME_W * scale) + "px";
      canvas.style.height = (GAME_H * scale) + "px";
    }

    window.addEventListener("resize", fitCanvas);
    // Emscripten がキャンバスを生成した後にも呼ぶ
    window.addEventListener("load", fitCanvas);

    // Raylibが InitWindow でcanvasのwidth/heightを変更した後もfitを呼ぶ
    (function () {
      var canvas = document.getElementById("canvas");
      if (canvas) {
        new MutationObserver(fitCanvas).observe(canvas, {
          attributes: true,
          attributeFilter: ["width", "height"],
        });
      }
    })();

    var Module = {
      canvas: (function () {
        var canvas = document.getElementById("canvas");
        fitCanvas();
        return canvas;
      })(),
      onRuntimeInitialized: function () {
        fitCanvas();
      },
    };
  </script>

  {{{ SCRIPT }}}
</body>
</html>
